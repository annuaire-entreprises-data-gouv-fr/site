# slug: ici mettre le nom du fichier
# title: titre de la page
# description: sous-titre
# footerLabel: libellé dans le footer
# published: true ou false, si a false la page n'est pas visible dans le footer
# filter: # demander de l'aide des développeurs
# seo:
#   title: titre SEO
#   description: description SEO
# reassurance:
#   - title: titre bloc 1
#     body: corps bloc 1
#   - title: titre bloc 2
#     body: body block 2
#   - title: titre bloc 3
#     body: body block 3
# datasources: la liste des administrations concernées (pour connaître la liste possible voir la liste des fichiers administrations dans https://github.com/annuaire-entreprises-data-gouv-fr/site/tree/main/data/administrations)
# body: le corps du texte, en markdown
slug: fondations
title: un organisme philanthropique
footerLabel: Fondations
published: true
description: Retrouvez les infos de fondations, fondations d'entreprise
  
  et fonds de dotation en France
filter:
  name: type
  value: fondation
seo:
  title: Rechercher un organisme philanthropique
  description: Retrouvez les informations légales des fondations en France
reassurance:
  - title: 'Fondation : définition'
    body: |
      Une fondation est une personne morale de droit privé à but non lucratif.
      
      Une fondation a pour but la cession irrévocable de ressources, de biens ou de droits, par une ou plusieurs personnes physiques ou morales, en vue de réaliser une œuvre d'intérêt général.
  - title: Bénéficier des informations officielles les plus à jour
    body: |
      - SIRET
      - SIREN
      - Numéro de TVA
      - Code NAF / APE
      - Avis de situation
      - Extrait d’Immatriculation au RNE
  - title: 'Entrepreneurs : pourquoi utiliser l’Annuaire dans vos démarches ?'
    body: |
      [L'Annuaire des Entreprises](https://annuaire-entreprises.data.gouv.fr) centralise les informations qui sont le plus souvent demandées lors des démarches administratives des entrepreneurs et des indépendants.
datasources:
  - mi
  - insee
  - inpi
