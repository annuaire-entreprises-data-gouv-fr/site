name: 'Deploy'
permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "hash de commit ou nom de branche à déployer"
        type: string
        required: true
jobs:
  build-docker-staging:
    name: Build staging Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Create .env file
        run: |
          cat > docker.env << 'EOF'
          VITE_MATOMO_SITE_ID=${{ secrets.MATOMO_SITE_ID_STAGING }}
          VITE_DATAPASS_URL=${{ secrets.DATAPASS_URL_STAGING }}
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN_STAGING }}
          VITE_BASE_URL=${{ secrets.BASE_URL_STAGING }}
          EOF
      - name: Sanitize branch name
        run: echo "branch_name=$(echo '${{ github.ref_name }}' | sed 's/^[^\/]*\///')" >> $GITHUB_OUTPUT
        id: sanitize
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GITLAB_REGISTRY_URL }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PAT }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-site:${{ github.sha }}-staging
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-site:${{ steps.sanitize.outputs.branch_name }}-staging
          cache-from: type=gha
          cache-to: type=gha,mode=max
  build-docker-production:
    name: Build production Docker image
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Create .env file
        run: |
          cat > docker.env << 'EOF'
          VITE_MATOMO_SITE_ID=${{ secrets.MATOMO_SITE_ID }}
          VITE_DATAPASS_URL=${{ secrets.DATAPASS_URL }}
          VITE_SENTRY_DSN=${{ secrets.SENTRY_DSN }}
          VITE_BASE_URL=${{ secrets.BASE_URL }}
          EOF
      - name: Sanitize branch name
        run: echo "branch_name=$(echo '${{ github.ref_name }}' | sed 's/^[^\/]*\///')" >> $GITHUB_OUTPUT
        id: sanitize
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ secrets.GITLAB_REGISTRY_URL }}
          username: ${{ secrets.GITLAB_REGISTRY_USER }}
          password: ${{ secrets.GITLAB_REGISTRY_PAT }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-site:${{ github.sha }}-production
            ${{ secrets.GITLAB_REGISTRY_URL }}/etalab/data.gouv.fr/infra/ade-site:${{ steps.sanitize.outputs.branch_name }}-production
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy - staging
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-docker-staging]
    environment:
      name: staging
    strategy:
      max-parallel: 1
      matrix:
        include:
          - environment: staging-04
            host: SSH_STAGING_04
          - environment: staging-03
            host: SSH_STAGING_03
    steps:
      - uses: actions/checkout@v6
      - name: Setup Wireguard
        uses: niklaskeerl/easy-wireguard-action@v2
        with:
          WG_CONFIG_FILE: ${{ secrets.WG_CONFIG_FILE }}
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v2.0
        with:
          app: "site"
          version: "${{ (inputs.tag || github.sha) }}-staging"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB_APP_DEPLOYER }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: false
          notify-on-success: false
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}

  trigger-production-deployment:
    name: Trigger production deployment
    runs-on: ubuntu-latest
    needs: [deploy-staging]
    environment:
      name: production
    timeout-minutes: 2
    steps:
      - run: echo "Deploying to production..." 
        name: Deploy gate

  deploy-production:
    name: Deploy - production
    runs-on: ubuntu-latest
    needs: [trigger-production-deployment]
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      matrix:
        include:
          - environment: production-01
            host: SSH_PRODUCTION_01
          - environment: production-03
            host: SSH_PRODUCTION_03
    steps:
      - uses: actions/checkout@v6
      - name: Setup Wireguard
        uses: niklaskeerl/easy-wireguard-action@v2
        with:
          WG_CONFIG_FILE: ${{ secrets.WG_CONFIG_FILE }}
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v1.1
        with:
          app-to-deploy: "annuaire-entreprises-site"
          app-repository: "https://github.com/annuaire-entreprises-data-gouv-fr/site.git"
          app-shortname: "website"
          version: "main"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_MACHINE_USER_PRIVATE_KEY }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: true
          notify-on-success: true
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
  deploy-production-new:
    name: Deploy - production new
    runs-on: ubuntu-latest
    needs: [deploy-production]
    timeout-minutes: 15
    strategy:
      max-parallel: 1
      matrix:
        include:
          - environment: production-02
            host: SSH_PRODUCTION_02
    steps:
      - uses: actions/checkout@v6
      - name: Setup Wireguard
        uses: niklaskeerl/easy-wireguard-action@v2
        with:
          WG_CONFIG_FILE: ${{ secrets.WG_CONFIG_FILE }}
      - uses: annuaire-entreprises-data-gouv-fr/github-actions/.github/actions/deploy@v2.0
        with:
          app: "site"
          version: "${{ (inputs.tag || github.sha) }}-production"
          environment: "${{ matrix.environment }}"
          ssh-key: ${{ secrets.SSH_PRIVATE_KEY_GITHUB_APP_DEPLOYER }}
          ssh-host: ${{ secrets[matrix.host] }}
          notify-on-failure: true
          notify-on-success: true
          tchap-url: ${{ secrets.TCHAP_URL }}
          tchap-token: ${{ secrets.TCHAP_TOKEN }}
