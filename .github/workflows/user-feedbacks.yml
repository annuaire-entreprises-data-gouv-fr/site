name: 'User feedbacks report'
permissions:
  contents: read

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

env:
  node-version: 22.22.2

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Use Node.js ${{ env.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.node-version }}

      - name: Enable pnpm
        run: corepack enable pnpm

      - name: Create and post feedbacks report
        run: |
          pnpm add node-fetch --ignore-scripts && GRIST_TABLE=${{ secrets.GRIST_FEEDBACKS_TABLE }} GRIST_API_KEY=${{ secrets.GRIST_API_KEY }}  TCHAP_FEEDBACKS_URL=${{ secrets.TCHAP_FEEDBACKS_URL }} TCHAP_TOKEN=${{ secrets.TCHAP_TOKEN }} node ./scripts/feedbacks/index.mjs

      # - name: Notify failure
      #   if: failure()
      #   uses: ./.github/actions/notify
      #   with:
      #     message: '🚨 ${{ github.event.repository.name }} : feedback report failed'
      #     tchap-url: ${{ secrets.TCHAP_FEEDBACKS_URL }}
      #     tchap-token: ${{ secrets.TCHAP_TOKEN }}
